name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src tests scripts
      - run: ruff format --check src tests scripts

  typecheck:
    name: Type check (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy
      - run: mypy --strict scripts/benchmark.py

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches pyproject.toml's requires-python = ">=3.10".
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: coverage run -m pytest
      - run: coverage report -m
      - if: matrix.python-version == '3.12'
        run: coverage xml
      - if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker-lab-build:
    name: Docker lab image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t autofuzz-ftp-lab docker/labs/ftp-vsftpd

  pip-audit:
    name: Dependency vulnerability scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]" pip-audit
      - run: pip-audit

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: fs
          scan-ref: .
          # docker/labs/ is a deliberately vulnerable fuzzing target (old
          # Ubuntu + vsftpd) - scanning it for vulnerabilities would just
          # flag the exact insecurity it exists to provide. There is no
          # app image to scan yet (that lands in Phase 10); this filesystem
          # scan covers dependencies and IaC config in the meantime.
          skip-dirs: docker/labs
          severity: CRITICAL,HIGH
          exit-code: "0"

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      # Blocking: baseline confirmed clean (0 findings against src/tests/
      # scripts) before this workflow was added, with the one real hit
      # (Flask-XSS rule false-positiving on a non-Flask Jinja2 renderer
      # that already has autoescape=True) suppressed inline with a
      # justifying comment in reporting/renderers/html.py, not silenced
      # by turning this step off.
      - run: semgrep scan --config=auto --error
