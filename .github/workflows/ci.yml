name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src tests scripts
      - run: ruff format --check src tests scripts

  typecheck:
    name: Type check (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: mypy
      - run: mypy --strict scripts/benchmark.py

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches pyproject.toml's requires-python = ">=3.10".
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: coverage run -m pytest
      - run: coverage report -m
      - if: matrix.python-version == '3.12'
        run: coverage xml
      - if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker-lab-build:
    name: Docker lab image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t autofuzz-ftp-lab docker/labs/ftp-vsftpd

  pip-audit:
    name: Dependency vulnerability scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]" pip-audit
      - run: pip-audit

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # docker/labs/ is a deliberately vulnerable fuzzing target (old
          # Ubuntu + vsftpd) - scanning it for vulnerabilities would just
          # flag the exact insecurity it exists to provide. There is no
          # app image to scan yet (that lands in Phase 10); this filesystem
          # scan covers dependencies and IaC config in the meantime.
          skip-dirs: docker/labs
          severity: CRITICAL,HIGH
          exit-code: "0"

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      # Blocking. The first verification pass only scanned src/tests/
      # scripts and missed 25 findings that only show up scanning the
      # whole repo (.github/workflows/, docker/); this step was fixed to
      # actually cover them.
      #
      # yaml.github-actions.security.github-actions-mutable-action-tag:
      # recommends pinning `uses:` references to a full 40-char commit SHA
      # instead of a version tag (`@v4`). That's a real, valid hardening
      # step - but this repo currently uses version tags, the same
      # convention GitHub's own docs/starter workflows default to, and a
      # hand-typed SHA that's even one character wrong breaks CI outright
      # (confirmed the hard way while investigating this exact finding).
      # Excluded here rather than suppressed line-by-line across ~24
      # `uses:` lines; upgrading to verified SHA pins is legitimate future
      # work, best done with a tool that resolves and checks them
      # correctly (e.g. Dependabot's pinned-digest updates) rather than by
      # hand.
      #
      # dockerfile.security.missing-user: suppressed at its one call site
      # (docker/labs/ftp-vsftpd/Dockerfile) with its own inline comment,
      # not excluded here - that one has a target-specific justification,
      # not a blanket one.
      - run: >-
          semgrep scan --config=auto --error
          --exclude-rule=yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag
