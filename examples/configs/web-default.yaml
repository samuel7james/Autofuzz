# AutoFuzz scan profile — Web Assessment Engine, default settings.
#
# IMPORTANT: `authorized` must be true for a scan to run. Only set it to
# true after confirming you have explicit, documented authorization to
# test the target you point this profile at.
name: web-default
engine: web
authorized: true

scheduler:
  concurrency: 15
  rate_limit_per_second: 20.0
  max_retries: 3
  retry_backoff_seconds: 1.0
  request_timeout_seconds: 15.0

web:
  max_crawl_depth: 4
  max_pages: 750
  follow_redirects: true
  # For an authorized assessment, paths an operator tried to keep out of
  # search engines via robots.txt are often exactly what's worth
  # enumerating - the crawler doesn't enforce exclusions from this flag
  # either way (see web/discovery/robots.py), but it's set false here to
  # reflect assessment intent rather than politeness-crawler defaults.
  respect_robots_txt: false

# enabled: null (default) runs every registered plugin - missing security
# headers, insecure cookies, server version disclosure, and technology
# fingerprinting all stay active unless explicitly disabled below.
plugins:
  disabled: []
